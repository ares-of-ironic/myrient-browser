# Myrient Browser Configuration
# Copy this file to config.toml and adjust settings

[server]
# Base URL of the HTTP repository (without trailing slash)
base_url = "https://myrient.erista.me/files"

# User-Agent header for HTTP requests
user_agent = "MyrientBrowser/1.0"

[download]
# Directory where downloaded files will be saved (relative to project root)
download_dir = "downloads"

# Number of concurrent downloads
concurrency = 4

# Number of retry attempts for failed downloads
retries = 3

# Delay between retries in seconds (exponential backoff multiplier)
retry_delay = 2.0

# Maximum retry delay in seconds
max_retry_delay = 60.0

# Chunk size for streaming downloads (bytes)
# Larger chunks = faster downloads but more memory usage
chunk_size = 8388608  # 8MB

# Connection timeout in seconds
timeout = 30

# Enable rate limiting (requests per second, 0 = disabled)
rate_limit = 0

# Number of parallel HTTP Range segments per file.
# Values > 1 split each file into N segments downloaded simultaneously,
# which can dramatically increase speed on high-latency or throttled servers.
# Set to 1 to disable segmented downloading.
segments_per_file = 4

# Minimum file size (in MB) required to use segmented downloading.
# Files smaller than this are always downloaded as a single stream.
min_segmented_mb = 8.0

[index]
# Path to the index file (relative to project root)
# Supports two formats:
#   - Text file (one path per line): all_paths.txt
#   - JSON file (rclone lsjson output): all_paths.json - includes file sizes!
#
# Sample index included for testing:
#   index_file = "directory/sample_index.json"
#
# To generate full JSON index with sizes using rclone:
#   rclone config create Myrient http url https://myrient.erista.me/files/
#   rclone lsjson --recursive Myrient: > directory/all_paths.json
#
index_file = "directory/all_paths.json"

# Enable automatic index reload when file changes
watch_enabled = false

# Polling interval for index file changes (seconds)
watch_interval = 60

# Maximum number of results returned by search in the Browser tab.
# Applies to both rg-backed search and the Python fuzzy fallback.
# Increase for larger result sets at the cost of slightly slower rendering.
search_limit = 500

[export]
# Default export directory
export_dir = "exports"

# Default export filename
default_filename = "selection.txt"

[logging]
# Log file path
log_file = "logs/app.log"

# Log level: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

# Maximum log file size in bytes before rotation
max_log_size = 10485760  # 10MB

# Number of backup log files to keep
backup_count = 3

[state]
# State file for download queue persistence
state_file = "state.json"

[display]
# Use decimal units (1 KB = 1000 bytes, 1 TB = 1000 GB)
# Set to false for binary units (1 KiB = 1024 bytes, 1 TiB = 1024 GiB)
# Decimal units match what most websites and storage vendors report
use_decimal_units = true

# Show human-readable output in `du` disk-usage reports (adds -h flag).
# false (default) = raw block count converted to your unit setting.
# true  = let `du` format the number (e.g. "4.2G") — ignores use_decimal_units.
du_human_readable = false
