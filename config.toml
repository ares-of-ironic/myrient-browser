# Myrient Browser Configuration
# Generated by the Settings panel — edit manually or via the TUI.

[server]
base_url = "https://myrient.erista.me/files"
user_agent = "Wget/1.25.0"

[download]
download_dir = "downloads"
concurrency = 2
retries = 5
retry_delay = 10.0
max_retry_delay = 60.0
chunk_size = 1048576
timeout = 30
rate_limit = 0.0
segments_per_file = 1
min_segmented_mb = 8.0

[index]
index_file = "directory/all_paths.json"
watch_enabled = false
watch_interval = 60
search_limit = 500

[export]
export_dir = "exports"
default_filename = "selection.txt"

[logging]
log_file = "logs/app.log"
log_level = "INFO"
max_log_size = 10485760
backup_count = 3

[state]
state_file = "state.json"

[display]
use_decimal_units = true
du_human_readable = false
